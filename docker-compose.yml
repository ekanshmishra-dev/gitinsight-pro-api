services:
  # 1. MySQL 8 Database Service
  db:
    image: mysql:8.0
    container_name: gitinsight_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: github_analyzer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Node.js Express Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gitinsight_api_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=github_analyzer
      # Optionally mount GITHUB_TOKEN if needed
      # - GITHUB_TOKEN=your_github_token
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
